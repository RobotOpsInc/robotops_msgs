name: Release Development

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (validate without creating release)'
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: '717949299175'
  DEPLOY_ROLE: arn:aws:iam::717949299175:role/github-actions-deploy-development
  CLOUDFRONT_DISTRIBUTION_ID: EE9YB1UW7HRUQ
  APT_BUCKET: robotops-apt-pub-development
  CODEARTIFACT_DOMAIN: robotops
  CODEARTIFACT_REPO: robotops-cargo

jobs:
  release-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Ensure release is from development branch
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/development" ]]; then
            echo "::error::Development releases can only be created from development branch"
            echo "Current branch: ${{ github.ref }}"
            exit 1
          fi

      - name: Get version from package.xml
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<version>)[^<]+' package.xml)
          DEV_TAG="v${VERSION}-development-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$DEV_TAG" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION (development)"

      - name: Check tag doesn't already exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${{ steps.version.outputs.tag }}$"; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG=$(awk -v ver="$VERSION" '
            /^[0-9]+\.[0-9]+\.[0-9]+ \(/ {
              if (found) exit
              if ($0 ~ ver) { found=1; next }
            }
            /^---/ { if (found) { next } }
            found { print }
          ' CHANGELOG.rst)
          echo "$CHANGELOG" > release_notes.md
          echo "Extracted changelog:"
          cat release_notes.md

      - name: Create GitHub Pre-Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Pre-Release ${{ steps.version.outputs.tag }}" \
            --notes-file release_notes.md \
            --prerelease

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "## Dry Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Would create pre-release:" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Title:** Pre-Release ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Notes" >> $GITHUB_STEP_SUMMARY
          cat release_notes.md >> $GITHUB_STEP_SUMMARY

  build-deb-packages:
    runs-on: ${{ matrix.runner }}
    needs: release-dev
    if: ${{ !inputs.dry_run }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<version>)[^<]+' package.xml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: robotops_msgs:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Debian package
        run: |
          docker run --rm \
            -v "$(pwd)":/output \
            robotops_msgs:ci bash -c "
              cd /ws/src/robotops_msgs && \
              bloom-generate rosdebian --os-name ubuntu --os-version noble --ros-distro jazzy && \
              dpkg-buildpackage -us -uc -b && \
              cp /ws/src/*.deb /output/
            "

      - name: Find built package
        id: deb
        run: |
          DEB_FILE=$(ls *.deb | head -n1)
          echo "file=$DEB_FILE" >> $GITHUB_OUTPUT
          echo "Built package: $DEB_FILE"

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: ${{ steps.deb.outputs.file }}
          retention-days: 1

      - name: Summary
        run: |
          echo "## Debian Package (Development - ${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "Package: ${{ steps.deb.outputs.file }}" >> $GITHUB_STEP_SUMMARY

  publish-debian:
    runs-on: ubuntu-latest
    needs: build-deb-packages
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download amd64 deb
        uses: actions/download-artifact@v4
        with:
          name: deb-amd64
          path: debs/

      - name: Download arm64 deb
        uses: actions/download-artifact@v4
        with:
          name: deb-arm64
          path: debs/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish to S3
        uses: ./.github/actions/publish-debian-s3
        with:
          deb-files: debs/*.deb
          apt-bucket: ${{ env.APT_BUCKET }}
          cloudfront-distribution-id: ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
          aws-region: ${{ env.AWS_REGION }}

  publish-rust-sdk:
    runs-on: ubuntu-latest
    needs: release-dev
    if: ${{ !inputs.dry_run }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<version>)[^<]+' package.xml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: robotops_msgs:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Rust SDK
        run: |
          mkdir -p generated/sdks/rust
          docker run --rm \
            -v "$(pwd)/generated:/ws/src/robotops_msgs/generated" \
            robotops_msgs:ci bash -c \
            "source /ws/install/setup.bash && /ws/src/robotops_msgs/tools/generate-sdk.sh"

      - name: Validate Rust SDK
        run: |
          docker run --rm \
            -v "$(pwd)/generated:/ws/src/robotops_msgs/generated" \
            robotops_msgs:ci bash -c \
            "source /ws/install/setup.bash && \
             cd /ws/src/robotops_msgs/generated/sdks/rust && \
             cargo check && cargo test"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish to CodeArtifact
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Get CodeArtifact auth token
          export CODEARTIFACT_AUTH_TOKEN=$(aws codeartifact get-authorization-token \
            --domain ${{ env.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ env.AWS_ACCOUNT_ID }} \
            --region ${{ env.AWS_REGION }} \
            --query authorizationToken \
            --output text)

          # Get CodeArtifact endpoint
          export CODEARTIFACT_ENDPOINT=$(aws codeartifact get-repository-endpoint \
            --domain ${{ env.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ env.AWS_ACCOUNT_ID }} \
            --repository ${{ env.CODEARTIFACT_REPO }} \
            --format cargo \
            --region ${{ env.AWS_REGION }} \
            --query repositoryEndpoint \
            --output text)

          # Run publish inside Docker with AWS credentials
          docker run --rm \
            -v "$(pwd)/generated:/ws/src/robotops_msgs/generated" \
            -e CODEARTIFACT_AUTH_TOKEN="${CODEARTIFACT_AUTH_TOKEN}" \
            -e CODEARTIFACT_ENDPOINT="${CODEARTIFACT_ENDPOINT}" \
            -e VERSION="${VERSION}" \
            robotops_msgs:ci bash -c '
              source /ws/install/setup.bash
              cd /ws/src/robotops_msgs/generated/sdks/rust
              mkdir -p ~/.cargo

              # Configure CodeArtifact registry
              cat > ~/.cargo/config.toml <<EOF
          [registries.codeartifact]
          index = "sparse+${CODEARTIFACT_ENDPOINT}"

          [registry]
          global-credential-providers = ["cargo:token"]
          EOF

              export CARGO_REGISTRIES_CODEARTIFACT_TOKEN="${CODEARTIFACT_AUTH_TOKEN}"

              # Publish builtin-interfaces first (dependency)
              cd builtin-interfaces
              cargo publish --registry codeartifact --allow-dirty || echo "builtin-interfaces may already exist"
              cd ..

              # Update robotops-msgs to use registry dependency instead of path
              sed -i "s|builtin_interfaces = { path = \"../builtin-interfaces\", package = \"builtin-interfaces\" }|builtin_interfaces = { version = \"${VERSION}\", registry = \"codeartifact\", package = \"builtin-interfaces\" }|" robotops-msgs/Cargo.toml

              # Wait for index to update
              sleep 10

              # Publish robotops-msgs
              cd robotops-msgs
              cargo publish --registry codeartifact --allow-dirty
            '

      - name: Summary
        run: |
          echo "## Rust SDK (Development)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "Crates: builtin-interfaces, robotops-msgs" >> $GITHUB_STEP_SUMMARY
          echo "Published to AWS CodeArtifact" >> $GITHUB_STEP_SUMMARY

  update-release-notes:
    runs-on: ubuntu-latest
    needs: [publish-debian, publish-rust-sdk]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<version>)[^<]+' package.xml)
          DEV_TAG="v${VERSION}-development-$(git rev-parse --short HEAD)"
          echo "tag=$DEV_TAG" >> $GITHUB_OUTPUT

      - name: Add package link to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_BODY=$(gh release view "${{ steps.version.outputs.tag }}" --json body -q .body)
          LINK=$'\n\n[View packages on apt.development.robotops.com](https://apt.development.robotops.com)'
          gh release edit "${{ steps.version.outputs.tag }}" --notes "${CURRENT_BODY}${LINK}"
